<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ohio Keno Pattern Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;800&display=swap" rel="stylesheet" />
<style>
  /* ── Design: industrial scoreboard / lottery terminal ── */
  :root {
    --bg:        #0a0c10;
    --panel:     #111418;
    --border:    #1e2530;
    --accent:    #f5c518;
    --accent2:   #e05c1a;
    --green:     #22c55e;
    --text:      #d4dbe8;
    --muted:     #5a6478;
    --ball-bg:   #1a1f2b;
    --mono:      'Share Tech Mono', monospace;
    --display:   'Barlow Condensed', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--display);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* ── Header ── */
  header {
    border-bottom: 2px solid var(--accent);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: baseline;
    gap: 1.2rem;
    background: linear-gradient(90deg, #111418 60%, #0d1117);
  }
  header h1 {
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: 0.06em;
    color: var(--accent);
    text-transform: uppercase;
  }
  header span {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* ── Layout ── */
  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── Panel ── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1.8rem;
    margin-bottom: 1.5rem;
  }
  .panel-title {
    font-size: 0.7rem;
    font-family: var(--mono);
    letter-spacing: 0.18em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
  }

  /* ── Form ── */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .form-group.full { grid-column: 1 / -1; }
  label {
    font-size: 0.65rem;
    font-family: var(--mono);
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }
  input[type="date"], input[type="text"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.95rem;
    padding: 0.6rem 0.8rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  /* fix date input icon color in dark mode */
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.6);
    cursor: pointer;
  }

  .worker-row {
    display: flex;
    gap: 0.6rem;
    align-items: stretch;
  }
  .worker-row input { flex: 1; }

  /* ── Number pills ── */
  .number-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.6rem;
    min-height: 2rem;
  }
  .pill {
    background: var(--accent);
    color: #000;
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: bold;
    padding: 0.2rem 0.55rem;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }

  /* ── Button ── */
  .btn {
    font-family: var(--display);
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    padding: 0.75rem 1.8rem;
    transition: all 0.15s;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
    width: 100%;
    margin-top: 1.2rem;
    font-size: 1.1rem;
  }
  .btn-primary:hover { background: #ffd740; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; transform: none; }
  .btn-sm {
    background: var(--border);
    color: var(--text);
    font-size: 0.75rem;
    padding: 0.5rem 1rem;
  }
  .btn-sm:hover { background: #2a3040; }

  /* ── Progress ── */
  .progress-wrap {
    display: none;
    margin-bottom: 1.5rem;
  }
  .progress-wrap.visible { display: block; }
  .progress-label {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
    letter-spacing: 0.1em;
  }
  .progress-bar-bg {
    background: var(--border);
    border-radius: 2px;
    height: 6px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s ease;
  }

  /* ── Status / error ── */
  .status-msg {
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.7rem 1rem;
    border-radius: 3px;
    margin-bottom: 1rem;
    display: none;
  }
  .status-msg.visible { display: block; }
  .status-msg.error { background: rgba(224,92,26,0.12); border: 1px solid var(--accent2); color: var(--accent2); }
  .status-msg.info  { background: rgba(245,197,24,0.08); border: 1px solid var(--accent);  color: var(--accent); }
  .status-msg.success { background: rgba(34,197,94,0.1); border: 1px solid var(--green); color: var(--green); }

  /* ── Results ── */
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }
  .results-count {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--accent);
  }
  .results-count span {
    font-size: 0.7rem;
    font-family: var(--mono);
    color: var(--muted);
    margin-left: 0.5rem;
    letter-spacing: 0.1em;
  }

  /* ── Match card ── */
  .match-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    border-radius: 3px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.75rem;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.7rem;
  }
  .card-date {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.05em;
  }
  .card-draw {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .balls {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
  }
  .ball {
    width: 2rem;
    height: 2rem;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: bold;
    background: var(--ball-bg);
    border: 1px solid var(--border);
    color: var(--text);
    transition: all 0.15s;
  }
  .ball.hit {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    box-shadow: 0 0 8px rgba(245,197,24,0.4);
  }

  /* ── No results ── */
  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    display: none;
  }
  .no-results.visible { display: block; }

  /* ── Footer ── */
  footer {
    text-align: center;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    padding: 2rem;
    border-top: 1px solid var(--border);
  }

  @media (max-width: 560px) {
    .form-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.6rem; }
    .ball { width: 1.7rem; height: 1.7rem; font-size: 0.65rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Keno Pattern Finder</h1>
  <span>Ohio Lottery · Draw Search</span>
</header>

<div class="container">

  <!-- Config panel -->
  <div class="panel">
    <div class="panel-title">⚙ Configuration</div>
    <div class="form-group">
      <label>Cloudflare Worker URL</label>
      <div class="worker-row">
        <input type="text" id="workerUrl" placeholder="https://your-worker.your-subdomain.workers.dev" />
        <button class="btn btn-sm" onclick="testWorker()">Test</button>
      </div>
    </div>
  </div>

  <!-- Search panel -->
  <div class="panel">
    <div class="panel-title">⌕ Search Parameters</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" id="startDate" />
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input type="date" id="endDate" />
      </div>
      <div class="form-group full">
        <label>Target Numbers (space or comma separated)</label>
        <input type="text" id="targetNums" placeholder="e.g.  1 4 9 11 18"
               oninput="updatePills()" />
        <div class="number-preview" id="pillBox"></div>
      </div>
    </div>
    <button class="btn btn-primary" id="searchBtn" onclick="runSearch()">
      ▶ Run Search
    </button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">Initialising...</div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Status messages -->
  <div class="status-msg" id="statusMsg"></div>

  <!-- Results -->
  <div id="resultsSection" style="display:none">
    <div class="results-header">
      <div class="results-count" id="resultsCount">0 <span>matches found</span></div>
      <button class="btn btn-sm" onclick="exportCSV()">↓ Export CSV</button>
    </div>
    <div id="matchList"></div>
    <div class="no-results" id="noResults">NO MATCHES FOUND IN DATE RANGE</div>
  </div>

</div>

<footer>Ohio Keno Pattern Finder · Data via Ohio Lottery · Not affiliated with Ohio Lottery</footer>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let allMatches = [];
let searchAborted = false;

// ── Defaults ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date();
  const weekAgo = new Date(today);
  weekAgo.setDate(today.getDate() - 7);
  document.getElementById('endDate').value   = fmtDateInput(today);
  document.getElementById('startDate').value = fmtDateInput(weekAgo);

  // Load saved worker URL
  const saved = localStorage.getItem('kenoWorkerUrl');
  if (saved) document.getElementById('workerUrl').value = saved;
});

function fmtDateInput(d) {
  return d.toISOString().split('T')[0];
}

// ── Number pills ──────────────────────────────────────────────────────────────
function parseNumbers(raw) {
  return [...new Set(
    raw.split(/[\s,]+/)
       .map(s => s.trim())
       .filter(s => /^\d+$/.test(s))
       .map(Number)
       .filter(n => n >= 1 && n <= 80)
  )].sort((a,b) => a-b);
}

function updatePills() {
  const nums = parseNumbers(document.getElementById('targetNums').value);
  const box = document.getElementById('pillBox');
  box.innerHTML = nums.map(n => `<span class="pill">${n}</span>`).join('');
}

// ── Worker test ───────────────────────────────────────────────────────────────
async function testWorker() {
  const url = document.getElementById('workerUrl').value.trim();
  if (!url) return showStatus('Enter your Worker URL first.', 'error');
  showStatus('Testing worker connection...', 'info');
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (data.status) {
      showStatus('✓ Worker connected successfully!', 'success');
      localStorage.setItem('kenoWorkerUrl', url);
    } else {
      showStatus('Worker responded but returned unexpected data.', 'error');
    }
  } catch(e) {
    showStatus(`Worker connection failed: ${e.message}`, 'error');
  }
}

// ── Status helper ─────────────────────────────────────────────────────────────
function showStatus(msg, type='info') {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className = `status-msg visible ${type}`;
}
function hideStatus() {
  document.getElementById('statusMsg').className = 'status-msg';
}

// ── Date helpers ──────────────────────────────────────────────────────────────
function dateRange(startStr, endStr) {
  const dates = [];
  const cur = new Date(startStr + 'T00:00:00');
  const end = new Date(endStr   + 'T00:00:00');
  while (cur <= end) {
    const m = String(cur.getMonth()+1).padStart(2,'0');
    const d = String(cur.getDate()).padStart(2,'0');
    const y = cur.getFullYear();
    dates.push(`${m}/${d}/${y}`);
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

// ── Main search ───────────────────────────────────────────────────────────────
async function runSearch() {
  const workerUrl = document.getElementById('workerUrl').value.trim();
  const startDate = document.getElementById('startDate').value;
  const endDate   = document.getElementById('endDate').value;
  const targetNums = parseNumbers(document.getElementById('targetNums').value);

  // Validate
  if (!workerUrl) return showStatus('Please enter your Cloudflare Worker URL.', 'error');
  if (!startDate || !endDate) return showStatus('Please select a date range.', 'error');
  if (startDate > endDate) return showStatus('Start date must be before end date.', 'error');
  if (targetNums.length === 0) return showStatus('Please enter at least one target number.', 'error');

  localStorage.setItem('kenoWorkerUrl', workerUrl);

  // Reset
  allMatches = [];
  searchAborted = false;
  document.getElementById('matchList').innerHTML = '';
  document.getElementById('noResults').className = 'no-results';
  document.getElementById('resultsSection').style.display = 'none';
  document.getElementById('resultsCount').innerHTML = '0 <span>matches found</span>';
  hideStatus();

  const dates = dateRange(startDate, endDate);
  const total  = dates.length;

  // UI: searching state
  document.getElementById('searchBtn').disabled = true;
  document.getElementById('searchBtn').textContent = '⏹ Stop';
  document.getElementById('searchBtn').onclick = () => { searchAborted = true; };
  document.getElementById('progressWrap').className = 'progress-wrap visible';
  document.getElementById('resultsSection').style.display = 'block';

  const targetSet = new Set(targetNums.map(String));

  for (let i = 0; i < dates.length; i++) {
    if (searchAborted) break;

    const dateStr = dates[i];
    const pct = Math.round(((i+1)/total)*100);
    document.getElementById('progressLabel').textContent =
      `Checking ${dateStr}… (${i+1} of ${total} days)`;
    document.getElementById('progressFill').style.width = pct + '%';

    try {
      const res = await fetch(`${workerUrl}/draws?date=${encodeURIComponent(dateStr)}`);
      if (!res.ok) {
        if (res.status === 401) {
          showStatus('Worker returned 401 — token could not be obtained automatically. Try redeploying the worker.', 'error');
          break;
        }
        continue;
      }
      const json = await res.json();

      // Unwrap envelope
      let draws = Array.isArray(json) ? json : (json.data || json.draws || json.results || []);

      for (const draw of draws) {
        const rawNums = draw.numbers || draw.Numbers || draw.WinningNumbers || [];
        // Extract values, filter to positions 1-20 (exclude booster)
        let nums;
        if (rawNums.length && typeof rawNums[0] === 'object') {
          nums = rawNums
            .filter(n => n.position >= 1 && n.position <= 20)
            .map(n => n.value);
        } else {
          nums = rawNums.slice(0, 20);
        }

        const numSet = new Set(nums.map(String));
        const isMatch = [...targetSet].every(n => numSet.has(n));

        if (isMatch) {
          const drawNum = draw.externalDrawId || draw.DrawNumber || draw.id || '?';
          const match = { date: dateStr, drawNum, numbers: nums.sort((a,b)=>a-b) };
          allMatches.push(match);
          renderCard(match, targetSet);
          document.getElementById('resultsCount').innerHTML =
            `${allMatches.length} <span>match${allMatches.length !== 1 ? 'es':''} found</span>`;
        }
      }
    } catch(e) {
      // Network error — skip this date silently
      console.warn(`Error fetching ${dateStr}:`, e);
    }

    // Yield to browser so UI stays responsive
    await new Promise(r => setTimeout(r, 0));
  }

  // Done
  document.getElementById('searchBtn').disabled = false;
  document.getElementById('searchBtn').textContent = '▶ Run Search';
  document.getElementById('searchBtn').onclick = runSearch;
  document.getElementById('progressWrap').className = 'progress-wrap';

  if (allMatches.length === 0 && !searchAborted) {
    document.getElementById('noResults').className = 'no-results visible';
    showStatus('Search complete. No matches found.', 'info');
  } else if (!searchAborted) {
    showStatus(`Search complete. ${allMatches.length} match${allMatches.length!==1?'es':''} found.`, 'success');
  } else {
    showStatus('Search stopped by user.', 'info');
  }
}

// ── Render a match card ───────────────────────────────────────────────────────
function renderCard(match, targetSet) {
  const list = document.getElementById('matchList');
  const card = document.createElement('div');
  card.className = 'match-card';

  const balls = match.numbers.map(n => {
    const hit = targetSet.has(String(n));
    return `<div class="ball${hit?' hit':''}">${n}</div>`;
  }).join('');

  card.innerHTML = `
    <div class="card-top">
      <div class="card-date">${match.date}</div>
      <div class="card-draw">DRAW #${match.drawNum}</div>
    </div>
    <div class="balls">${balls}</div>
  `;
  list.appendChild(card);
}

// ── CSV export ────────────────────────────────────────────────────────────────
function exportCSV() {
  if (!allMatches.length) return showStatus('No matches to export.', 'error');
  const rows = [['Date','Draw Number','Winning Numbers']];
  for (const m of allMatches) {
    rows.push([m.date, m.drawNum, m.numbers.join(' ')]);
  }
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `keno_matches_${Date.now()}.csv`;
  a.click();
}
</script>
</body>
</html>
